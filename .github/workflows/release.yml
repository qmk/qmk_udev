name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: What version to release.
        required: true

jobs:
  release:
    name: New Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22

      - name: Install cross-compilers
        run: sudo apt-get install -y gcc-aarch64-linux-gnu gcc-riscv64-linux-gnu qemu-user-static

      - name: Build linuxX64
        run: make CC=gcc && mv qmk_id qmk_id-linuxX64 && make clean

      - name: Build linuxARM64
        run: make CC=aarch64-linux-gnu-gcc && mv qmk_id qmk_id-linuxARM64 && make clean

      - name: Build linuxRV64
        run: make CC=riscv64-linux-gnu-gcc && mv qmk_id qmk_id-linuxRV64 && make clean

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: v${{ github.event.inputs.release_tag }}
          make_latest: true
          files: |
            50-qmk.rules
            qmk_id-linuxX64
            qmk_id-linuxARM64
            qmk_id-linuxRV64
            README.md
